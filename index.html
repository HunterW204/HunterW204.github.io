<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChiMishe Farsi Drill — All Chapters</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#eef6ff;
  --surface:#fff;
  --surface2:#f0f8ff;
  --blue:#2a7fc0;
  --blue-dk:#1a5a8a;
  --blue-lt:#c8e6fa;
  --blue-pale:#e4f2fc;
  --blue-glow:rgba(42,127,192,0.15);
  --green:#1e9070;
  --green-bg:rgba(30,144,112,0.1);
  --red:#c0392b;
  --red-bg:rgba(192,57,43,0.09);
  --text:#0e1f2e;
  --muted:#6a8ca8;
  --border:rgba(42,127,192,0.18);
}
html,body{min-height:100vh;background:var(--bg);font-family:"DM Sans",sans-serif;color:var(--text);}
body{background-image:radial-gradient(ellipse at 10% 10%,rgba(42,127,192,0.09) 0%,transparent 50%),radial-gradient(ellipse at 90% 90%,rgba(30,144,112,0.06) 0%,transparent 50%);}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--blue-lt);border-radius:3px;}

/* ══ SELECTOR ══ */
#sel{max-width:760px;margin:0 auto;padding:2.5rem 1.5rem 7rem;animation:fadeIn .3s ease;}
.app-header{text-align:center;margin-bottom:2.5rem;}
.app-title{font-family:"DM Serif Display",serif;font-size:2.6rem;color:var(--blue-dk);line-height:1;font-weight:normal;}
.app-sub{font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-top:.4rem;}
.app-orn{color:var(--blue);opacity:.38;font-size:.9rem;letter-spacing:.55em;margin:.55rem 0 0;}

/* unit grouping */
.unit-section{margin-bottom:2rem;}
.unit-header{
  display:flex;align-items:center;gap:.7rem;margin-bottom:.9rem;cursor:pointer;
  padding:.5rem .2rem;border-radius:6px;transition:background .15s;
}
.unit-header:hover{background:rgba(42,127,192,0.04);}
.unit-label{
  font-size:.72rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;
  color:var(--muted);flex:1;
}
.unit-toggle{
  font-size:.68rem;color:var(--muted);padding:.16rem .5rem;border-radius:4px;
  border:1px solid var(--border);background:transparent;cursor:pointer;
  font-family:inherit;transition:all .14s;
}
.unit-toggle:hover{border-color:var(--blue);color:var(--blue);}
.unit-divider{flex:1;height:1px;background:var(--border);}

.chapters-grid{display:flex;flex-direction:column;gap:1rem;}
.chapter-block{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.9rem 1.1rem;}
.chapter-header{display:flex;align-items:center;gap:.6rem;margin-bottom:.65rem;}
.chapter-name{font-size:.78rem;font-weight:600;color:var(--blue-dk);flex:1;}
.ch-sel-btn{
  font-size:.65rem;letter-spacing:.06em;text-transform:uppercase;
  color:var(--muted);padding:.15rem .5rem;border-radius:4px;
  border:1px solid var(--border);background:transparent;cursor:pointer;
  font-family:inherit;transition:all .14s;white-space:nowrap;
}
.ch-sel-btn:hover{border-color:var(--blue);color:var(--blue);}

.lesson-chips{display:flex;flex-wrap:wrap;gap:.35rem;}
.lchip{
  padding:.3rem .75rem;border-radius:20px;cursor:pointer;
  font-size:.76rem;font-family:inherit;
  border:1.5px solid var(--border);background:transparent;color:var(--muted);
  transition:all .15s;white-space:nowrap;
}
.lchip.on{background:var(--blue-dk);border-color:var(--blue-dk);color:#fff;}
.lchip:hover:not(.on){border-color:var(--blue);color:var(--blue-dk);}
.lchip .vc{font-size:.65rem;opacity:.7;margin-left:.25rem;}

/* filter row */
.filter-row{
  display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:.9rem 1.2rem;margin-bottom:1.2rem;
}
.filter-row label{font-size:.88rem;cursor:pointer;display:flex;align-items:center;gap:.45rem;}
.filter-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--blue-dk);cursor:pointer;}

/* top quick-select */
.quick-row{display:flex;gap:.45rem;flex-wrap:wrap;margin-bottom:1rem;}
.qbtn{
  padding:.28rem .72rem;font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;
  border:1px solid var(--border);background:transparent;color:var(--muted);
  border-radius:6px;cursor:pointer;font-family:inherit;transition:all .14s;
}
.qbtn:hover{border-color:var(--blue);color:var(--blue-dk);}

/* sticky start bar */
.start-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(238,246,255,0.97);border-top:1px solid var(--border);
  padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;
  backdrop-filter:blur(8px);z-index:50;
}
.wcount{font-size:.88rem;color:var(--muted);}
.wcount strong{color:var(--blue-dk);font-size:1.1rem;}
.start-btn{
  padding:.78rem 2rem;background:var(--blue-dk);color:#fff;
  border:none;border-radius:8px;font-family:inherit;font-size:.95rem;
  font-weight:600;cursor:pointer;letter-spacing:.05em;transition:all .15s;
}
.start-btn:hover{background:var(--text);transform:translateY(-1px);}
.start-btn:disabled{background:var(--muted);cursor:not-allowed;transform:none;}

/* section label */
.slabel{font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:.7rem;display:flex;align-items:center;gap:.6rem;}
.slabel::after{content:"";flex:1;height:1px;background:var(--border);}

/* ══ GAME SCREEN ══ */
#game{display:none;flex-direction:column;align-items:center;padding:1.5rem 1rem 4rem;min-height:100vh;}
#game.on{display:flex;}
.gw{width:100%;max-width:520px;display:flex;flex-direction:column;gap:.9rem;}
.topbar{display:flex;align-items:center;justify-content:space-between;}
.back-btn{font-size:.74rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border:1px solid var(--border);background:transparent;padding:.3rem .72rem;border-radius:6px;cursor:pointer;font-family:inherit;transition:all .14s;}
.back-btn:hover{border-color:var(--blue);color:var(--blue);}
.pile-badge{font-size:.76rem;font-weight:500;color:var(--blue-dk);background:var(--blue-lt);padding:.22rem .68rem;border-radius:20px;}
.prog-row{display:flex;gap:.5rem;align-items:center;}
.prog-track{flex:1;height:6px;background:var(--blue-lt);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),#5ab8f0);border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.prog-pct{font-size:.74rem;color:var(--muted);min-width:3rem;text-align:right;}
.word-card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:2.8rem 2rem;text-align:center;box-shadow:0 4px 30px rgba(42,127,192,0.09),inset 0 1px 0 rgba(255,255,255,.8);position:relative;overflow:hidden;}
.word-card::before{content:"";position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(42,127,192,0.06) 0%,transparent 70%);pointer-events:none;}
.word-card.shake{animation:shake .35s cubic-bezier(.36,.07,.19,.97);}
.word-card.pop{animation:pop .3s cubic-bezier(.34,1.56,.64,1);}
.card-chip{display:inline-block;font-size:.65rem;letter-spacing:.13em;text-transform:uppercase;color:var(--blue);background:var(--blue-pale);padding:.18rem .62rem;border-radius:20px;margin-bottom:.85rem;}
.farsi-word{font-family:"Vazirmatn",sans-serif;font-size:clamp(2rem,6vw,3.2rem);font-weight:700;color:var(--blue-dk);direction:rtl;line-height:1.3;margin-bottom:.3rem;}
.card-hint{font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);}
.answer-reveal{padding:.9rem 1.2rem;background:var(--surface2);border-radius:10px;border:1px solid var(--border);animation:fadeUp .22s ease;}
.answer-reveal .eng{font-family:"DM Serif Display",serif;font-size:1.65rem;color:var(--text);}
.input-row{display:flex;gap:.55rem;}
.ans-input{flex:1;padding:.82rem 1rem;font-size:1rem;font-family:inherit;border:1.5px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s;}
.ans-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-glow);}
.ans-input.correct{border-color:var(--green);background:var(--green-bg);}
.ans-input.wrong{border-color:var(--red);background:var(--red-bg);}
.go-btn{padding:.82rem 1.3rem;background:var(--blue-dk);color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:.95rem;font-weight:500;cursor:pointer;transition:background .14s,transform .1s;}
.go-btn:hover{background:var(--text);}
.go-btn:active{transform:scale(.97);}
.verdict-row{display:flex;gap:.55rem;animation:fadeUp .2s ease;}
.vbtn{flex:1;padding:.75rem;border:none;border-radius:10px;font-family:inherit;font-size:.86rem;font-weight:500;cursor:pointer;letter-spacing:.04em;transition:all .15s;}
.vbtn.knew{background:var(--green-bg);color:var(--green);border:1.5px solid rgba(30,144,112,.25);}
.vbtn.knew:hover{background:var(--green);color:#fff;}
.vbtn.nope{background:var(--red-bg);color:var(--red);border:1.5px solid rgba(192,57,43,.2);}
.vbtn.nope:hover{background:var(--red);color:#fff;}
.feedback{padding:.55rem .9rem;border-radius:8px;font-size:.85rem;font-weight:500;text-align:center;animation:fadeUp .18s ease;min-height:2.2rem;}
.feedback.ok{background:var(--green-bg);color:var(--green);}
.feedback.err{background:var(--red-bg);color:var(--red);}
.feedback.hide{opacity:0;}
.dots-row{display:flex;gap:.28rem;flex-wrap:wrap;justify-content:center;padding:.2rem 0;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--blue-lt);transition:all .25s ease;}
.dot.done{background:var(--green);transform:scale(.7);opacity:.55;}
.dot.cur{background:var(--blue);transform:scale(1.35);box-shadow:0 0 0 3px var(--blue-glow);}
.dot.retry{background:var(--red);opacity:.65;}
.complete-card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:3rem 2rem;text-align:center;box-shadow:0 4px 30px rgba(42,127,192,0.09);animation:fadeUp .4s ease;width:100%;max-width:520px;}
.complete-card .trophy{font-size:3.5rem;margin-bottom:1rem;}
.complete-card h2{font-family:"DM Serif Display",serif;font-size:2rem;color:var(--blue-dk);margin-bottom:.5rem;}
.complete-card p{color:var(--muted);font-size:.9rem;margin-bottom:2rem;line-height:1.6;}
.cs{display:flex;justify-content:center;gap:2.5rem;margin-bottom:2rem;}
.cs-n{font-size:2.4rem;font-weight:700;text-align:center;}
.cs-l{font-size:.67rem;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);text-align:center;margin-top:.2rem;}
.cbtns{display:flex;gap:.7rem;justify-content:center;}
.cbtn{padding:.8rem 1.8rem;border:none;border-radius:8px;font-family:inherit;font-size:.9rem;font-weight:500;cursor:pointer;letter-spacing:.05em;transition:all .15s;}
.cbtn.p{background:var(--blue-dk);color:#fff;}
.cbtn.p:hover{background:var(--text);transform:translateY(-1px);}
.cbtn.g{background:transparent;border:1.5px solid var(--border);color:var(--blue-dk);}
.cbtn.g:hover{border-color:var(--blue-dk);background:var(--blue-pale);}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.03)}100%{transform:scale(1)}}
@media(max-width:768px){
  .cs{gap:1.5rem;}
  .app-title{font-size:2.2rem;}
}
@media(max-width:480px){
  #sel{padding:1.5rem 1rem 6rem;}
  .app-title{font-size:2rem;}
  .start-bar{padding:.8rem 1rem;}
}
/* utility classes for dynamic content */
.filter-row-wrap{margin-bottom:1.2rem;}
.filter-hint{font-size:.8rem;color:var(--muted);}
.unit-wc{font-weight:400;opacity:.6;}
.ch-meta{font-weight:400;color:var(--muted);font-size:.72rem;}
.cs-n.blue{color:var(--blue-dk);}
.cs-n.red{color:var(--red);}
.cs-n.grn{color:var(--green);}
.verdict-msg{margin-bottom:.55rem;}

/* ══ DARK MODE ══ */
[data-theme="dark"]{
  --bg:#0d1b2a;
  --surface:#1a2d40;
  --surface2:#152333;
  --blue:#5ab8f0;
  --blue-dk:#7ecdf5;
  --blue-lt:#1e3a52;
  --blue-pale:#162a3c;
  --blue-glow:rgba(90,184,240,0.15);
  --green:#2ecc8f;
  --green-bg:rgba(46,204,143,0.12);
  --red:#e05a4b;
  --red-bg:rgba(224,90,75,0.12);
  --text:#e8f4fc;
  --muted:#7aafc8;
  --border:rgba(90,184,240,0.18);
}
[data-theme="dark"] body{background-image:radial-gradient(ellipse at 10% 10%,rgba(90,184,240,0.07) 0%,transparent 50%),radial-gradient(ellipse at 90% 90%,rgba(46,204,143,0.05) 0%,transparent 50%);}
[data-theme="dark"] .word-card::before{background:radial-gradient(circle,rgba(90,184,240,0.06) 0%,transparent 70%);}

/* ══ NEW COMPONENTS ══ */
.theme-toggle{position:fixed;top:.9rem;right:1rem;z-index:60;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.3rem .55rem;font-size:1rem;cursor:pointer;color:var(--muted);transition:all .15s;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.theme-toggle:hover{border-color:var(--blue);transform:scale(1.05);}
.topbar-right{display:flex;gap:.5rem;align-items:center;}
.streak-badge{font-size:.76rem;font-weight:600;padding:.22rem .68rem;border-radius:20px;background:rgba(255,152,0,0.13);color:#e08500;border:1px solid rgba(255,152,0,0.28);}
[data-theme="dark"] .streak-badge{color:#ffb347;background:rgba(255,152,0,0.18);}
.hint-area{display:flex;flex-direction:column;align-items:center;gap:.35rem;min-height:2rem;}
.hint-btn{font-size:.72rem;letter-spacing:.05em;color:var(--muted);border:1px dashed var(--border);background:transparent;border-radius:6px;padding:.28rem .72rem;cursor:pointer;font-family:inherit;transition:all .15s;}
.hint-btn:hover{border-color:var(--blue);color:var(--blue-dk);}
.hint-text{font-size:.92rem;color:var(--muted);font-family:"DM Serif Display",serif;letter-spacing:.15em;}
.kbd-hint{font-size:.68rem;color:var(--muted);opacity:.55;text-align:right;}
.cs-time{font-size:.82rem;color:var(--muted);margin-bottom:1.5rem;}

/* Reverse mode */
.english-word { font-family: 'DM Serif Display', serif; font-size: 2.2rem; color: var(--text); margin: 0.5rem 0 1rem; text-align: center; }
.reveal-btn { background: transparent; border: 2px dashed var(--blue); color: var(--blue); border-radius: 10px; padding: 0.6rem 1.8rem; font-size: 1rem; cursor: pointer; margin-top: 0.5rem; transition: background 0.2s; font-family: inherit; }
.reveal-btn:hover { background: var(--blue-glow); }

/* Multiple choice */
.mc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-top: 1rem; width: 100%; max-width: 480px; }
.mc-btn { background: var(--surface); border: 2px solid var(--border); border-radius: 12px; padding: 0.75rem 1rem; font-size: 1rem; cursor: pointer; text-align: left; transition: border-color 0.2s, background 0.2s; display: flex; align-items: center; gap: 0.5rem; font-family: inherit; color: var(--text); }
.mc-btn:hover { border-color: var(--blue); }
.mc-btn.correct { border-color: var(--green); background: var(--green-bg); }
.mc-btn.wrong { border-color: var(--red); background: var(--red-bg); }
.mc-key { font-size: 0.75rem; color: var(--muted); font-weight: 700; min-width: 1.2rem; }

/* Word limit buttons */
.lbtn { background: var(--surface); border: 1.5px solid var(--border); border-radius: 20px; padding: 0.3rem 0.9rem; font-size: 0.85rem; cursor: pointer; transition: background 0.2s, border-color 0.2s; font-family: inherit; color: var(--text); }
.lbtn.on { background: var(--blue-dk); color: #fff; border-color: var(--blue-dk); }
.limit-btns { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.filter-hint-span { font-size: 0.85rem; color: var(--muted); align-self: center; }
.filter-row-wrap { flex-wrap: wrap; align-items: center; gap: 0.5rem; }

/* Stat dots */
.stat-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-left: 4px; vertical-align: middle; }
.stat-dot.good { background: #22c55e; }
.stat-dot.ok { background: #f59e0b; }
.stat-dot.bad { background: #ef4444; }

/* Missed words */
.missed-section { margin-top: 1.5rem; text-align: left; }
.missed-section h3 { font-size: 1rem; color: var(--text); margin-bottom: 0.5rem; }
.missed-list { max-height: 220px; overflow-y: auto; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); }
.missed-item { display: flex; align-items: center; padding: 0.5rem 0.9rem; border-bottom: 1px solid var(--border); gap: 1rem; }
.missed-item:last-child { border-bottom: none; }
.missed-fa { font-family: 'Vazirmatn', sans-serif; font-size: 1.1rem; direction: rtl; flex: 1; color: var(--text); }
.missed-en { font-size: 0.9rem; color: var(--muted); flex: 1.5; }

/* Keyboard shortcut hint */
.kbd-shortcut { font-size: 0.72rem; background: rgba(0,0,0,0.08); border-radius: 4px; padding: 1px 4px; margin-left: 4px; font-family: monospace; }
/* SRS badges */
.srs-badge{font-size:.6rem;padding:.1rem .42rem;border-radius:20px;margin-left:.3rem;vertical-align:middle;border:1px solid;font-weight:600;}
.srs-badge.srs-new{background:rgba(42,127,192,.12);color:var(--blue-dk);border-color:rgba(42,127,192,.22);}
.srs-badge.srs-due{background:rgba(255,152,0,.13);color:#b86e00;border-color:rgba(255,152,0,.28);}
.srs-badge.srs-ok{background:var(--green-bg);color:var(--green);border-color:rgba(30,144,112,.22);}
[data-theme="dark"] .srs-badge.srs-due{color:#ffb347;}
/* Example sentence */
.example-sentence{margin-top:.7rem;padding-top:.65rem;border-top:1px dashed var(--border);text-align:center;}
.sent-fa{font-family:"Vazirmatn",sans-serif;font-size:1rem;direction:rtl;color:var(--text);line-height:1.6;margin-bottom:.25rem;}
.sent-tr{font-size:.82rem;color:var(--muted);font-style:italic;line-height:1.5;}
/* Swipe hint */
.swipe-hint{font-size:.7rem;color:var(--muted);text-align:center;opacity:.5;margin-top:.2rem;}
/* Session resume banner */
.resume-banner{background:var(--surface);border:1.5px solid var(--blue);border-radius:12px;padding:.85rem 1.1rem;margin-bottom:1.1rem;display:flex;align-items:center;gap:.7rem;flex-wrap:wrap;}
.resume-banner p{font-size:.86rem;color:var(--text);flex:1;min-width:160px;margin-bottom:0;}
.resume-banner strong{color:var(--blue-dk);}
.resume-btns{display:flex;gap:.45rem;}
/* Export row */
.export-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.6rem;}
.export-btn{font-size:.78rem;padding:.36rem .85rem;background:transparent;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;color:var(--blue-dk);font-family:inherit;transition:all .14s;}
.export-btn:hover{border-color:var(--blue);background:var(--blue-pale);}
/* Sparkline */
.lchip-sparkline{vertical-align:middle;margin-left:3px;}
</style>
</head>
<body>

<button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">🌙</button>

<!-- ══ SELECTOR ══ -->
<main>
<section id="sel" aria-label="Lesson selector">
  <div class="app-header">
    <h1 class="app-title" lang="fa">واژه‌آموز</h1>
    <div class="app-sub">ChiMishe · Farsi Drill — All Chapters</div>
    <div class="app-orn" aria-hidden="true">✦ ✦ ✦</div>
  </div>

  <div id="resume-banner" style="display:none" class="resume-banner">
    <p>Unfinished session: <strong id="resume-info"></strong></p>
    <div class="resume-btns">
      <button class="cbtn p" style="font-size:.82rem;padding:.5rem 1.1rem" onclick="resumeSession()">Resume →</button>
      <button class="cbtn g" style="font-size:.82rem;padding:.5rem 1.1rem" onclick="dismissResume()">Dismiss</button>
    </div>
  </div>

  <div class="slabel">Options</div>
  <div class="filter-row filter-row-wrap">
    <label for="verbs-only"><input type="checkbox" id="verbs-only"> Verbs only</label>
    <label for="reverse-mode"><input type="checkbox" id="reverse-mode"> Reverse (E→F)</label>

function renderSparkline(history){
  if(!history||history.length<2)return'';
  const w=44,h=16,pad=2;
  const pts=history.map((v,i)=>{
    const x=pad+(i/(history.length-1))*(w-pad*2);
    const y=h-pad-((v/100))*(h-pad*2);
    return`${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return`<svg width="${w}" height="${h}" class="lchip-sparkline" aria-hidden="true"><polyline points="${pts}" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity=".7"/></svg>`;
}

function toggleUnit(unit, header) {
  const unitId = 'unit-' + unit.replace(/ /g,'_');
  const chaps = UNITS[unit];
  const allLessons = chaps.flatMap(ch => STRUCTURE[ch]);
  const allOn = allLessons.every(l => selected.has(l));
  allLessons.forEach(l => {
    if (allOn) selected.delete(l); else selected.add(l);
    const chip = document.querySelector(`[data-lesson="${l}"]`);
    if (chip) chip.classList.toggle('on', !allOn);
  });
  const btn = header.querySelector('.unit-toggle');
  if (btn) btn.textContent = allOn ? 'Select all' : 'Deselect all';
  updateCount();
}

function toggleChapter(ch, btn) {
  const lessons = STRUCTURE[ch];
  const allOn = lessons.every(l => selected.has(l));
  lessons.forEach(l => {
    if (allOn) selected.delete(l); else selected.add(l);
    const chip = document.querySelector(`[data-lesson="${l}"]`);
    if (chip) chip.classList.toggle('on', !allOn);
  });

}

function toggleLesson(lesson, el) {

}

function buildHint(answer, level) {
  const first = answer.split(/[,\/]/)[0].trim();
  return first.split(' ').map(word => {
    const reveal = Math.min(level, word.length);
    return word.slice(0, reveal) + '_'.repeat(word.length - reveal);
  }).join(' ');
}

function hintMaxLevel(answer) {
  const first = answer.split(/[,\/]/)[0].trim();
  return Math.max(...first.split(' ').map(w => w.length));
}

function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function norm(s){ return s.toLowerCase().replace(/[,،.!?;:()\/\-]/g,' ').replace(/\s+/g,' ').trim(); }
function isOk(input,answer){
  const i=norm(input),a=norm(answer);
  if(i===a) return true;
  if(strictMode) return false;
  return a.split(/[,\/]/).map(v=>v.trim()).filter(Boolean).some(v=>i===v||(v.length>=3&&i.includes(v)));
}

function generateMCChoices(correctIdx) {
  const pool = allWords.map((_,i) => i).filter(i => i !== correctIdx);
  const distractors = pool.sort(() => Math.random() - 0.5).slice(0, 3);
  mcChoices = [correctIdx, ...distractors].sort(() => Math.random() - 0.5);
}

function submitMC(chosenIdx) {
  if (chosenIdx === curIdx) {
    done.add(curIdx); streak++;
    mcWrongIdx = -1;
    renderGame();
    setTimeout(() => nextWord(), autoAdvance ? 300 : 900);
  } else {
    mcWrongIdx = chosenIdx;
    renderGame();
    setTimeout(() => {
      mcWrongIdx = -1;
      renderGame();
    }, 1500);
  }
}

function renderMCButtons(word) {
  let html = '<div class="mc-grid">';
  mcChoices.forEach((idx, i) => {
    const w = allWords[idx];
    const label = reverseMode ? w.f : w.e;
    const isCorrect = idx === curIdx;
    const isWrong = idx === mcWrongIdx;
    const showCorrect = mcWrongIdx !== -1 && isCorrect;
    const finalCls = showCorrect ? 'mc-btn correct' : isWrong ? 'mc-btn wrong' : 'mc-btn';
    html += `<button class="${finalCls}" onclick="submitMC(${idx})"><span class="mc-key">${i+1}.</span>${label}</button>`;
  });
  html += '</div>';
  return html;
}

  localStorage.setItem('chimishe_stats', JSON.stringify(stats));

function updateStats() {
  const stats = loadStats();
  const total = allWords.length;
  const acc = total > 0 ? Math.round((done.size / total) * 100) : 0;
  const today = new Date().toISOString().slice(0, 10);
  selected.forEach(lessonKey => {
    if (!stats[lessonKey]) stats[lessonKey] = { sessions: 0, lastAcc: 0, bestAcc: 0, lastDate: '' };
    stats[lessonKey].sessions++;
    stats[lessonKey].lastAcc = acc;
    stats[lessonKey].bestAcc = Math.max(stats[lessonKey].bestAcc, acc);
    stats[lessonKey].lastDate = today;
    if(!stats[lessonKey].history)stats[lessonKey].history=[];
    stats[lessonKey].history.push(acc);
    if(stats[lessonKey].history.length>7)stats[lessonKey].history.shift();
  });
  saveStats(stats);
}

function loadSRS(){try{return JSON.parse(localStorage.getItem('chimishe_srs')||'{}');}catch(e){return{};}}
function saveSRS(){localStorage.setItem('chimishe_srs',JSON.stringify(srsData));}
function srsUpdate(word,quality){
  const key=word.f;
  const today=new Date().toISOString().slice(0,10);
  const r=srsData[key]||{interval:1,ef:2.5,due:today,reps:0};
  if(quality>=1){
    if(r.reps===0)r.interval=1;
    else if(r.reps===1)r.interval=6;
    else r.interval=Math.round(r.interval*r.ef);
    r.reps++;
    r.ef=Math.max(1.3,r.ef+0.1-(1-quality)*(0.08+(1-quality)*0.02));
  }else{r.reps=0;r.interval=1;r.ef=Math.max(1.3,r.ef-0.2);}
  r.interval=Math.min(r.interval,180);
  const due=new Date();due.setDate(due.getDate()+r.interval);
  r.due=due.toISOString().slice(0,10);
  srsData[key]=r;saveSRS();
}
function srsDue(word){
  const r=srsData[word.f];if(!r)return 0;
  const today=new Date().toISOString().slice(0,10);
  return Math.max(0,Math.round((new Date(r.due)-new Date(today))/(864e5)));
}
function srsLabel(word){
  const r=srsData[word.f];
  if(!r||r.reps===0)return'<span class="srs-badge srs-new">new</span>';
  const d=srsDue(word);
  if(d===0)return'<span class="srs-badge srs-due">review</span>';
  return`<span class="srs-badge srs-ok">+${d}d</span>`;
}

function startGame() {
  const vo = document.getElementById('verbs-only').checked;
  allWords = [];
  const seen = new Set();
  selected.forEach(l => {
    (VOCAB[l]||[]).filter(w => vo ? w.v : true).forEach((w,i) => {
      if (!seen.has(w.f)) { seen.add(w.f); allWords.push({...w, lesson:l}); }
    });
  });
  if (wordLimit > 0) allWords = allWords.slice(0, wordLimit);
  srsData=loadSRS();
  queue=shuffle(allWords.map((_,i)=>i));
  queue.sort((a,b)=>srsDue(allWords[a])-srsDue(allWords[b]));
  retryPile=[];done.clear();totalRounds=0;wrongCount=0;
  streak=0;hintsUsed=0;startTime=Date.now();hintLevel=0;
  missedWords=[];mcChoices=[];mcWrongIdx=-1;
  Object.keys(missCounts).forEach(k=>delete missCounts[k]);
  clearSession();
  document.getElementById('sel').style.display='none';
  document.getElementById('start-bar').style.display='none';
  document.getElementById('game').classList.add('on');
  nextWord();
}

function nextWord() {
  if(queue.length===0){
    if(retryPile.length===0){renderComplete();return;}
    // Sort most-missed words to front, shuffle within ties
    queue=shuffle([...retryPile]).sort((a,b)=>(missCounts[b]||0)-(missCounts[a]||0));
    retryPile=[];
  }
  curIdx=queue.shift();phase='q';totalRounds++;hintLevel=0;
  if (multipleChoice) generateMCChoices(curIdx);
  mcWrongIdx=-1;
  renderGame();
  saveSession();
  setTimeout(()=>{const i=document.getElementById('ans');if(i)i.focus();},60);
}

function handleKey(e){if(e.key==='Enter'&&phase==='q')submit();}

function submit(){
  if(cardAnim)return;
  const inp=document.getElementById('ans');
  if(!inp||!inp.value.trim())return;
  const word=allWords[curIdx];
  const target = reverseMode ? word.f : word.e;
  if(isOk(inp.value.trim(), target)){
    inp.classList.add('correct');
    done.add(curIdx);phase='correct';cardAnim=true;animCard('pop');streak++;
    renderGame();
    setTimeout(()=>{cardAnim=false;nextWord();},autoAdvance ? 300 : 900);
  } else {
    inp.classList.add('wrong');wrongCount++;animCard('shake');phase='revealed';streak=0;
    renderGame();
  }
}

function verdict(knew){
  if(knew){done.add(curIdx);srsUpdate(allWords[curIdx],1);}
  else{
    missedWords.push(allWords[curIdx]);
    missCounts[curIdx]=(missCounts[curIdx]||0)+1;retryPile.push(curIdx);
    srsUpdate(allWords[curIdx],0);
  }
  nextWord();
}

function animCard(cls){
  const c=document.getElementById('wcard');if(!c)return;
  c.classList.remove('shake','pop');void c.offsetWidth;c.classList.add(cls);
  setTimeout(()=>c.classList.remove(cls),400);
}

function goBack(){
  document.getElementById('game').classList.remove('on');
  document.getElementById('sel').style.display='';
  document.getElementById('start-bar').style.display='';
}

function renderGame(){
  const gw=document.getElementById('gw');
  const word=allWords[curIdx];
  const pct=Math.min(100,Math.round((done.size/allWords.length)*100));
  const step=allWords.length>120?Math.ceil(allWords.length/120):1;
  const retrySet=new Set(retryPile);
  let dots='';
  for(let i=0;i<allWords.length;i+=step){
    const end=Math.min(i+step,allWords.length);
    let cls='dot';
    let isDone=false,isCur=false,isRetry=false;
    for(let j=i;j<end;j++){
      if(done.has(j)){isDone=true;break;}
      if(j===curIdx)isCur=true;
      if(retrySet.has(j))isRetry=true;
    }
    if(isDone)cls+=' done';
    else if(isCur)cls+=' cur';
    else if(isRetry)cls+=' retry';
    dots+=`<div class="${cls}"></div>`;
  }

  const streakHtml=streak>=3?`<span class="streak-badge">🔥 ${streak}</span>`:'';
  let inputArea='';
  let cardInner='';

  if(reverseMode) {
    // Reverse mode: show English, ask for Farsi
    cardInner=`
      <div class="card-chip">${lessonGameLabel(word.lesson)}</div>${srsLabel(word)}
      <div class="english-word">${word.e}</div>
      <div class="card-hint">What is this in Farsi?</div>`;
    if(phase==='q') {
      if(multipleChoice) {
        inputArea=renderMCButtons(word)+`<div class="kbd-hint">1–4 to select</div>`;
      } else {
        inputArea=`
          <div class="input-row">
            <input id="ans" class="ans-input" type="text" placeholder="بنویسید…"
              autocomplete="off" autocorrect="off" spellcheck="false" dir="rtl" lang="fa"
              style="font-family:'Vazirmatn',sans-serif;font-size:1.1rem">
            <button class="go-btn" onclick="submit()" aria-label="Submit answer">→</button>
          </div>
          <div class="kbd-hint">↵ Enter to submit · Space to reveal</div>`;
      }
    } else if(phase==='revealed') {
      const _se=SENTENCES&&SENTENCES[word.f];const sentHtml=_se?`<div class="example-sentence"><div class="sent-fa">${_se.s}</div><div class="sent-tr">${_se.t}</div></div>`:'';
      inputArea=`
        <div class="answer-reveal"><div class="eng" style="font-family:'Vazirmatn',sans-serif;direction:rtl;font-size:1.8rem">${word.f}</div></div>
        ${sentHtml}
        <div class="feedback err verdict-msg" role="status">Did you know it?</div>
        <div class="verdict-row">
          <button class="vbtn knew" onclick="verdict(true)">✓ I knew it <span class="kbd-shortcut">[Y]</span></button>
          <button class="vbtn nope" onclick="verdict(false)">✗ Repeat it <span class="kbd-shortcut">[N]</span></button>
        </div>
        <div class="swipe-hint">← Repeat &nbsp;·&nbsp; Knew it →</div>`;
    } else if(phase==='correct') {
      inputArea=`<div class="feedback ok" role="status">✓ Correct! Moving on…</div>`;
    }
  } else {
    // Normal mode: show Farsi, ask for English
    cardInner=`
      <div class="card-chip">${lessonGameLabel(word.lesson)}</div>${srsLabel(word)}
      <div class="farsi-word" lang="fa">${word.f}</div>
      <div class="card-hint">What does this mean in English?</div>`;
    if(phase==='q') {
      if(multipleChoice) {
        inputArea=renderMCButtons(word)+`<div class="kbd-hint">1–4 to select</div>`;
      } else {
        const canRevealMore=hintLevel<hintMaxLevel(word.e);
        const hintHtml=hintLevel===0
          ?`<button class="hint-btn" onclick="showHint()">Show hint</button>`
          :`<div class="hint-text">${buildHint(word.e,hintLevel)}</div>
            ${canRevealMore?`<button class="hint-btn" onclick="showHint()">More letters</button>`:'<span class="hint-btn" style="opacity:.4;cursor:default">Fully revealed</span>'}`;
        inputArea=`
          <div class="input-row">
            <input id="ans" class="ans-input" type="text" placeholder="Type the English meaning…"
              autocomplete="off" autocorrect="off" spellcheck="false">
            <button class="go-btn" onclick="submit()" aria-label="Submit answer">→</button>
          </div>
          <div class="hint-area">${hintHtml}</div>
          <div class="kbd-hint">↵ Enter to submit</div>
          <div class="feedback hide" role="status">​</div>`;
      }
    } else if(phase==='correct') {
      const _se=SENTENCES&&SENTENCES[word.f];const sentHtml=_se?`<div class="example-sentence"><div class="sent-fa">${_se.s}</div><div class="sent-tr">${_se.t}</div></div>`:'';
      inputArea=`
        <div class="input-row">
          <input id="ans" class="ans-input correct" type="text" value="${word.e.replace(/"/g,'&quot;')}" disabled aria-label="Correct answer">
        </div>
        ${sentHtml}
        <div class="feedback ok" role="status">✓ Correct! Moving on…</div>`;
    } else {
      const _se=SENTENCES&&SENTENCES[word.f];const sentHtml=_se?`<div class="example-sentence"><div class="sent-fa">${_se.s}</div><div class="sent-tr">${_se.t}</div></div>`:'';
      inputArea=`
        <div class="answer-reveal"><div class="eng">${word.e}</div></div>
        ${sentHtml}
        <div class="feedback err verdict-msg" role="status">Did you know it?</div>
        <div class="verdict-row">
          <button class="vbtn knew" onclick="verdict(true)">✓ I knew it <span class="kbd-shortcut">[Y]</span></button>
          <button class="vbtn nope" onclick="verdict(false)">✗ Repeat it <span class="kbd-shortcut">[N]</span></button>
        </div>
        <div class="swipe-hint">← Repeat &nbsp;·&nbsp; Knew it →</div>`;
    }
  }

  gw.innerHTML=`
    <div class="topbar">
      <button class="back-btn" onclick="goBack()" aria-label="Back to lesson selector">← Lessons</button>
      <div class="topbar-right">
        ${streakHtml}
        <span class="pile-badge" aria-label="${done.size} of ${allWords.length} words done">${done.size} / ${allWords.length} done</span>
      </div>
    </div>
    <div class="prog-row" role="progressbar" aria-valuenow="${pct}" aria-valuemin="0" aria-valuemax="100" aria-label="Progress">
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
      <div class="prog-pct">${pct}%</div>
    </div>
    <div class="word-card" id="wcard">
      ${cardInner}
    </div>
    ${inputArea}
    <div class="dots-row" aria-hidden="true">${dots}</div>`;

  if(phase==='q' && !multipleChoice){
    const inp=document.getElementById('ans');
    if(inp)inp.addEventListener('keydown',handleKey,{once:false});
  }
}

function exportMissedClipboard(){
  const text=uniqueMissed.map(w=>`${w.f}\t${w.e}`).join('\n');
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.querySelector('.export-btn');
    if(btn){const old=btn.textContent;btn.textContent='✓ Copied!';setTimeout(()=>btn.textContent=old,1500);}
  }).catch(()=>alert('Copy failed — try the CSV download instead.'));
}
function exportMissedCSV(){
  const csv='Farsi,English\n'+uniqueMissed.map(w=>`"${w.f.replace(/"/g,'""')}","${w.e.replace(/"/g,'""')}"`).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='missed-words.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function renderComplete(){
  updateStats();
  clearSession();
  const gw=document.getElementById('gw');
  const acc=totalRounds>0?Math.round((allWords.length/totalRounds)*100):100;
  const elapsed=startTime?Math.round((Date.now()-startTime)/1000):0;
  const mins=Math.floor(elapsed/60),secs=elapsed%60;
  const timeStr=`${mins}:${secs.toString().padStart(2,'0')}`;
  const hintsNote=hintsUsed>0?` · ${hintsUsed} hint${hintsUsed>1?'s':''}`:''
  // Deduplicate missed words by Farsi form
  const seenMissed=new Set();
  uniqueMissed=missedWords.filter(w=>{ if(seenMissed.has(w.f))return false; seenMissed.add(w.f); return true; });
  let missedHtml='';
  if(uniqueMissed.length>0){
    missedHtml=`<div class="missed-section">
      <h3>Missed words (${uniqueMissed.length})</h3>
      <div class="export-row">
        <button class="export-btn" onclick="exportMissedClipboard()">📋 Copy to clipboard</button>
        <button class="export-btn" onclick="exportMissedCSV()">⬇ Download CSV</button>
      </div>
      <div class="missed-list">
        ${uniqueMissed.map(w=>`<div class="missed-item">
          <span class="missed-fa">${w.f}</span>
          <span class="missed-en">${w.e}</span>
        </div>`).join('')}
      </div>
    </div>`;
  }
  gw.innerHTML=`
    <div class="complete-card">
      <div class="trophy">🎉</div>
      <h2>آفرین! All done!</h2>
      <p>You mastered all <strong>${allWords.length}</strong> words.</p>
      <div class="cs-time">Completed in ${timeStr}${hintsNote}</div>
      <div class="cs">
        <div><div class="cs-n blue">${allWords.length}</div><div class="cs-l">Mastered</div></div>
        <div><div class="cs-n red">${wrongCount}</div><div class="cs-l">Missed</div></div>
        <div><div class="cs-n grn">${acc}%</div><div class="cs-l">Accuracy</div></div>
      </div>
      <div class="cbtns">
        <button class="cbtn g" onclick="goBack()">← Change lessons</button>
        <button class="cbtn p" onclick="startGame()">Play again →</button>
      </div>
      ${missedHtml}
    </div>`;
}

buildSelector();
updateCount();

// Static element event listeners (replacing inline onclick/onchange)
document.getElementById('btn-select-all').addEventListener('click', selectAll);
document.getElementById('btn-clear-all').addEventListener('click', selectNone);
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('verbs-only').addEventListener('change', updateCount);
document.getElementById('theme-toggle').addEventListener('click', toggleDarkMode);

// New feature event listeners
document.getElementById('reverse-mode').addEventListener('change', e => { reverseMode = e.target.checked; });
document.getElementById('multi-choice').addEventListener('change', e => { multipleChoice = e.target.checked; });
document.getElementById('auto-advance').addEventListener('change', e => { autoAdvance = e.target.checked; });
document.getElementById('strict-mode').addEventListener('change', e => { strictMode = e.target.checked; });
document.querySelectorAll('#limit-btns .lbtn').forEach(btn => {
  btn.addEventListener('click', () => {
    wordLimit = parseInt(btn.dataset.limit);
    document.querySelectorAll('#limit-btns .lbtn').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
  });
});

// Global keyboard shortcuts
function globalKey(e) {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === ' ' && phase === 'q' && !multipleChoice) { e.preventDefault(); revealFarsi(); return; }
  if (phase === 'q' && !multipleChoice && !reverseMode && e.key === 'Enter') { submit(); return; }
  if (phase === 'revealed' || (reverseMode && phase === 'revealed')) {
    if (e.key === 'y' || e.key === 'Y' || e.key === '1') { verdict(true); return; }
    if (e.key === 'n' || e.key === 'N' || e.key === '2') { verdict(false); return; }
  }
  if (phase === 'q' && multipleChoice) {
    const n = parseInt(e.key);
    if (n >= 1 && n <= 4 && mcChoices[n-1] !== undefined) { submitMC(mcChoices[n-1]); return; }
  }
}
document.addEventListener('keydown', globalKey);
document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)<60||Math.abs(dy)>Math.abs(dx)*0.8)return;
  if(phase!=='revealed')return;
  if(dx>0)verdict(true);else verdict(false);
},{passive:true});

// Load saved theme preference
const savedTheme = localStorage.getItem('theme');
if(savedTheme === 'dark'){
  document.documentElement.setAttribute('data-theme','dark');
  document.getElementById('theme-toggle').textContent = '☀️';
}

// Session restore check
const sess=loadSession();
if(sess&&sess.allWords&&sess.allWords.length){
  const nb=document.getElementById('resume-banner');
  const ni=document.getElementById('resume-info');
  if(nb&&ni){
    ni.textContent=`${sess.allWords.length} words, ${sess.done.length} done`;
    nb.style.display='flex';
  }
}
</script>
